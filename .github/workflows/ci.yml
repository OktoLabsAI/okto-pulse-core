name: CI

# Lightweight CI for okto-pulse-core (the engine library).
#
# Aligned with the project's testing methodology: behavioral correctness is
# gated by the okto-pulse release pipeline (Docker smoke + MCP replay), not
# by repeating brittle unit tests across an OS×Python matrix that don't
# reflect what we actually ship.
#
# This workflow only verifies that the package is well-formed:
#   - imports cleanly
#   - lints clean
#   - type-checks clean
#   - builds a distributable wheel
#   - has no security/license/secret regressions
#
# Single runner (ubuntu-latest), single Python (3.12 — the version pulse's
# Docker image ships with; the codebase uses PEP 701 nested f-strings which
# require 3.12+, so older Pythons are not a target).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    name: lint + typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff pyright build

      - name: Import smoke test
        run: |
          python -c "import okto_pulse.core; print('package imports cleanly')"

      - name: Lint (ruff, advisory)
        # Advisory: there are ~145 pre-existing lint findings (mostly
        # E712 == False comparisons in SQLAlchemy where conditions, where
        # `is False` would change semantics, plus a few F841 unused
        # locals). Promote to strict once those are triaged.
        continue-on-error: true
        run: ruff check src/

      - name: Type check (pyright, advisory)
        # Advisory: the codebase has type debt being worked through.
        # Strict gate gets reinstated once clean.
        continue-on-error: true
        run: pyright src/

      - name: Build distributable wheel
        run: python -m build

      - name: Verify wheel installs into a clean env
        run: |
          python -m venv /tmp/wheel-check-env
          /tmp/wheel-check-env/bin/pip install dist/*.whl
          /tmp/wheel-check-env/bin/python -c "import okto_pulse.core; print('wheel imports cleanly')"

  security:
    name: security + license
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: pip install -e .

      - name: Dependency audit (advisory)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

      - name: License compliance
        run: |
          pip install pip-licenses
          pip-licenses --fail-on="GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU Affero General Public License v3 (AGPLv3)"

      - name: Secret scan
        # Pinned to commit SHA for supply-chain integrity (audit C1).
        # SHA below is v3.95.2 (released 2026-04-21). When bumping, update
        # both the SHA and the trailing version comment together.
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          extra_args: --only-verified
