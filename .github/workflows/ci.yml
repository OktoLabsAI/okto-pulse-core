name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio psutil

      - name: Lint
        run: |
          pip install ruff
          ruff check src/ || true

      - name: Type check
        run: |
          pip install pyright
          pyright src/ || true

      - name: Run KG lifecycle + file-handle tests (strict ResourceWarning)
        run: |
          python -W error::ResourceWarning -m pytest -x --tb=short -q tests/test_kg_schema_lifecycle.py tests/test_kg_file_handles.py

      - name: Run full KG suite
        run: |
          python -m pytest --tb=short -q -k "kg" --junitxml=pytest-report.xml

      - name: Run E2E KG pipeline tests
        run: |
          python -m pytest -m e2e --tb=short -q

      - name: Upload pytest report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: pytest-report.xml
          retention-days: 14

      - name: Build package
        run: |
          pip install build
          python -m build

  security:
    name: Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Dependency audit
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit

      - name: License compliance
        run: |
          pip install pip-licenses
          pip-licenses --fail-on="GNU General Public License v2 (GPLv2);GNU General Public License v3 (GPLv3);GNU Affero General Public License v3 (AGPLv3)"

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
