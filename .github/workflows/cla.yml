name: CLA Check

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    name: CLA Signature
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')

    steps:
      - name: CLA Assistant
        # Pinned to commit SHA of v2.6.1 for supply-chain integrity (audit
        # H4 — closes the OWASP "pwn request" pattern on pull_request_target).
        # When bumping, update both the SHA and trailing version comment.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/OktoLabsAI/okto-pulse-core/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "oktolabsai-developer,Maheidem,maheidem,dependabot[bot],github-actions[bot]"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to agree to our [Contributor License Agreement](https://github.com/OktoLabsAI/okto-pulse-core/blob/main/CLA.md).

            To sign, please comment below with:

            > I have read the CLA Document and I hereby sign the CLA

          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
